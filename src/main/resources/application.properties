spring.application.name=mediamanager

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mediamanager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mediamanager}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mediamanager}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

ombi.url=${OMBI_URL:}
ombi.api-key=${OMBI_API_KEY:}

radarr.url=${RADARR_URL:}
radarr.api-key=${RADARR_API_KEY:}

sonarr.url=${SONARR_URL:}
sonarr.api-key=${SONARR_API_KEY:}

deluge.url=${DELUGE_URL:}
deluge.password=${DELUGE_PASSWORD:}

sabnzbd.url=${SABNZBD_URL:}
sabnzbd.api-key=${SABNZBD_API_KEY:}

plex.url=${PLEX_URL:}
plex.token=${PLEX_TOKEN:}
plex.movies-section-name=${PLEX_MOVIES_SECTION_NAME:Movies}
plex.tv-section-name=${PLEX_TV_SECTION_NAME:TV Shows}
plex.cache.dir=${PLEX_CACHE_DIR:}

mediamanager.bootstrap.username=${MEDIAMANAGER_BOOTSTRAP_USERNAME}
mediamanager.bootstrap.password=${MEDIAMANAGER_BOOTSTRAP_PASSWORD}
