spring.application.name=mediamanager

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mediamanager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mediamanager}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mediamanager}
# Flyway owns the schema (migrations in classpath:db/migration). baseline-on-migrate stamps an existing
# pre-Flyway database at the V1 baseline without re-running it; a fresh/empty database is built from V1.
# Hibernate no longer creates or alters the schema (ddl-auto=none) — schema changes go in new V{n} migrations.
spring.jpa.hibernate.ddl-auto=none
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Bound every outbound RestClient call (Ombi/Radarr/Sonarr/Deluge/SABnzbd/Plex). These services are
# VPN-fronted and can hang; without timeouts a stalled call pins a ui-task-executor thread forever,
# leaving spinners spinning and eventually exhausting the pool. See AsyncExecutorConfig.
spring.http.client.connect-timeout=10s
spring.http.client.read-timeout=30s

# Per-host circuit breaker + bounded GET retry wrapped around the timeouts above (see
# ResilientRestClientConfig). When a service stops answering, its breaker opens after
# minimum-calls have been seen and the failure rate exceeds failure-rate-threshold (%), then fails
# fast for open-state-seconds before probing again — so a single downed integration can't keep
# pinning ui-task-executor threads for the full read-timeout. Defaults suit a personal instance's
# low call volume.
mediamanager.resilience.failure-rate-threshold=${RESILIENCE_FAILURE_RATE_THRESHOLD:50}
mediamanager.resilience.sliding-window-size=${RESILIENCE_SLIDING_WINDOW_SIZE:10}
mediamanager.resilience.minimum-calls=${RESILIENCE_MINIMUM_CALLS:5}
mediamanager.resilience.open-state-seconds=${RESILIENCE_OPEN_STATE_SECONDS:30}
mediamanager.resilience.max-retry-attempts=${RESILIENCE_MAX_RETRY_ATTEMPTS:2}
mediamanager.resilience.retry-backoff-millis=${RESILIENCE_RETRY_BACKOFF_MILLIS:500}

ombi.url=${OMBI_URL:}
ombi.api-key=${OMBI_API_KEY:}

radarr.url=${RADARR_URL:}
radarr.api-key=${RADARR_API_KEY:}

sonarr.url=${SONARR_URL:}
sonarr.api-key=${SONARR_API_KEY:}

deluge.url=${DELUGE_URL:}
deluge.password=${DELUGE_PASSWORD:}

sabnzbd.url=${SABNZBD_URL:}
sabnzbd.api-key=${SABNZBD_API_KEY:}

plex.url=${PLEX_URL:}
plex.token=${PLEX_TOKEN:}
plex.movies-section-name=${PLEX_MOVIES_SECTION_NAME:Movies}
plex.tv-section-name=${PLEX_TV_SECTION_NAME:TV Shows}
plex.cache.dir=${PLEX_CACHE_DIR:}

mediamanager.bootstrap.username=${MEDIAMANAGER_BOOTSTRAP_USERNAME}
mediamanager.bootstrap.password=${MEDIAMANAGER_BOOTSTRAP_PASSWORD}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

notifications.enabled=${NOTIFICATIONS_ENABLED:true}
notifications.from=${NOTIFICATIONS_FROM:}
notifications.to=${NOTIFICATIONS_TO:}
notifications.stuck-download-days=${NOTIFICATIONS_STUCK_DOWNLOAD_DAYS:14}
notifications.overdue-request-days=${NOTIFICATIONS_OVERDUE_REQUEST_DAYS:90}
notifications.unsearched-days=${NOTIFICATIONS_UNSEARCHED_DAYS:30}
notifications.new-request-window-hours=${NOTIFICATIONS_NEW_REQUEST_WINDOW_HOURS:24}
notifications.cron=${NOTIFICATIONS_CRON:0 0 8 * * *}

# Prepended to Radarr-reported file paths before checking the local filesystem (e.g. when the media
# volume is mounted at a different root than Radarr sees). Empty = paths are checked as-is.
mediamanager.local-file-system-prefix=${LOCAL_FILE_SYSTEM_PREFIX:}

# Path to the ffprobe binary used by the "Scan with FFprobe" action. Default resolves it on PATH.
ffmpeg.ffprobe-path=${FFPROBE_PATH:ffprobe}

management.endpoints.web.exposure.include=health,info,metrics

# JobRunr background job queue. "Scan with FFprobe" enqueues a job that JobRunr runs asynchronously,
# persisting jobs to the shared Postgres datasource (it auto-creates its own jobrunr_* tables on first
# start). worker-count is the GLOBAL concurrency cap — the most jobs that run at once — so queued
# ffprobe scans can't overwhelm the server with parallel subprocesses; tune it to taste.
jobrunr.background-job-server.enabled=${JOBRUNR_SERVER_ENABLED:true}
jobrunr.background-job-server.worker-count=${JOBRUNR_WORKER_COUNT:2}
# NOTE: the OSS dashboard has NO authentication and serves on its own port (it is NOT behind this app's
# Spring Security). Keep it on the VPN / firewalled, or set JOBRUNR_DASHBOARD_ENABLED=false to disable it.
jobrunr.dashboard.enabled=${JOBRUNR_DASHBOARD_ENABLED:true}
jobrunr.dashboard.port=${JOBRUNR_DASHBOARD_PORT:8000}
