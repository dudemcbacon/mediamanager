<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Requests</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }
        h2 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .status-pending { color: orange; font-weight: bold; }
        .status-approved { color: green; font-weight: bold; }
        .status-rejected { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h2 th:text="'Submitted Movie Requests - ' + ${#lists.size(movies)}">Submitted Movie Requests</h2>

    <form th:action="@{/movies/search-missing}" method="post" style="margin-bottom: 16px;">
        <button type="submit">Search all movies with no history</button>
    </form>

    <label style="display: inline-block; margin-bottom: 16px; color: #0f5132;">
        <input type="checkbox" id="toggle-available" checked
               onchange="(function(checked){ document.querySelectorAll('tr.row-available').forEach(function(r){ r.style.display = checked ? '' : 'none'; }); })(this.checked);">
        Show available movies
        (<span th:text="${#lists.size(movies.?[ombiRequestStatus == 'Common.Available' and radarrHasFile == true])}">0</span>)
    </label>

    <label style="display: inline-block; margin-bottom: 16px; margin-left: 16px; color: #842029;">
        <input type="checkbox" id="toggle-potentially-available" checked
               onchange="(function(checked){ document.querySelectorAll('tr.row-potentially-available').forEach(function(r){ r.style.display = checked ? '' : 'none'; }); })(this.checked);">
        Show potentially available
        (<span th:text="${#lists.size(movies.?[radarrHasFile == true and ombiRequestStatus != 'Common.Available'])}">0</span>)
    </label>

    <label style="display: inline-block; margin-bottom: 16px; margin-left: 16px; color: #664d03;">
        <input type="checkbox" id="toggle-unsearched" checked
               onchange="(function(checked){ document.querySelectorAll('tr.row-unsearched').forEach(function(r){ r.style.display = checked ? '' : 'none'; }); })(this.checked);">
        Show unsearched
        (<span th:text="${#lists.size(movies.?[ombiRequestStatus == 'Common.ProcessingRequest' and radarrHasFile == false])}">0</span>)
    </label>

    <label style="display: inline-block; margin-bottom: 16px; margin-left: 16px;">
        <input type="checkbox" id="toggle-normal" checked
               onchange="(function(checked){ document.querySelectorAll('tr.row-normal').forEach(function(r){ r.style.display = checked ? '' : 'none'; }); })(this.checked);">
        Show normal requests
        (<span th:text="${#lists.size(movies.?[!(ombiRequestStatus == 'Common.Available' and radarrHasFile == true) and !(radarrHasFile == true and ombiRequestStatus != 'Common.Available') and !(ombiRequestStatus == 'Common.ProcessingRequest' and radarrHasFile == false)])}">0</span>)
    </label>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>tmdbId</th>
                <th>Ombi Available</th>
                <th>Ombi Request Id</th>
                <th>Ombi Request Status</th>
                <th>Ombi User Name</th>
                <th>Radarr Request Id</th>
                <th>Radarr Has File</th>
                <th>Radarr Is Available</th>
                <th>Radarr Last Searched</th>
                <th>Plex Media Id</th>
                <th>Plex tmdbId</th>
                <th>Links</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- If the list is empty, show a friendly message -->
            <tr th:if="${#lists.isEmpty(movies)}">
                <td colspan="14" style="text-align: center;">No movie requests found.</td>
            </tr>

            <!-- Loop through the list of movies -->
            <tr th:each="movie : ${movies}"
                th:classappend="${movie.ombiRequestStatus == 'Common.Available' and movie.radarrHasFile == true} ? 'row-available' : (${movie.radarrHasFile == true and movie.ombiRequestStatus != 'Common.Available'} ? 'row-potentially-available' : (${movie.ombiRequestStatus == 'Common.ProcessingRequest' and movie.radarrHasFile == false} ? 'row-unsearched' : 'row-normal'))"
                th:style="${movie.radarrHasFile == true and movie.ombiRequestStatus != 'Common.Available'} ? 'background-color: rgb(248, 215, 218);' : (${movie.ombiRequestStatus == 'Common.ProcessingRequest' and movie.radarrHasFile == false} ? 'background-color: rgb(255, 243, 205);' : (${movie.ombiRequestStatus == 'Common.Available' and movie.radarrHasFile == true} ? 'background-color: rgb(209, 231, 221);' : ''))">
                <td th:text="${movie.title}">Movie Title</td>
                <td><a th:href="${'https://www.themoviedb.org/movie/' + movie.tmdbid}" th:text="${movie.tmdbid}" target="_blank"></a></td>
                <td th:text="${movie.ombiAvailable}">2000</td>
                <td th:text="${movie.ombiRequestId}">2000</td>
                <td th:text="${movie.ombiRequestStatus}">2000</td>
                <td th:text="${movie.ombiUserName}"></td>
                <td th:text="${movie.radarrRequestId}"></td>
                <td th:text="${movie.radarrHasFile}"></td>
                <td th:text="${movie.radarrIsAvailable}"></td>
                <td th:text="${movie.radarrLastSearchTime != null ? #temporals.format(movie.radarrLastSearchTime, 'MM/dd/yy HH:mm:ss') : ''}"></td>
                <td th:text="${movie.plexMediaId}"></td>
                <td><a th:if="${movie.plexTmdbid != null}" th:href="${'https://www.themoviedb.org/movie/' + movie.plexTmdbid}" th:text="${movie.plexTmdbid}" target="_blank"></a></td>
                <td>
                    <a th:href="${'https://ombi.butt.report/details/movie/' + movie.tmdbid}" target="_blank">Ombi</a>
                    <br>
                    <a th:href="${'https://radarr.butt.report/movie/' + movie.tmdbid}" target="_blank">Radarr</a>
                    <br th:if="${movie.plexMetadataUrl != null}">
                    <a th:if="${movie.plexMetadataUrl != null}" th:href="${movie.plexMetadataUrl}" target="_blank">Plex Metadata</a>
                </td>
                <td>
                    <form th:action="@{'/movies/' + ${movie.id} + '/refresh'}" method="post" style="margin:0;">
                        <button type="submit">Refresh</button>
                    </form>
                    <form th:action="@{'/movies/' + ${movie.id} + '/reprocess'}" method="post" style="margin:0;">
                        <button type="submit">Reprocess</button>
                    </form>
                    <form th:if="${movie.radarrRequestId != null}"
                          th:action="@{'/movies/' + ${movie.radarrRequestId} + '/search'}" method="post" style="margin:0;">
                        <button type="submit">Search</button>
                    </form>
                    <form th:action="@{'/movies/' + ${movie.id} + '/mark-available'}" method="post" style="margin:0;">
                        <button type="submit">Mark Available</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
