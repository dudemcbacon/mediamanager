<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Requests</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }
        h2 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .status-pending { color: orange; font-weight: bold; }
        .status-approved { color: green; font-weight: bold; }
        .status-rejected { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Submitted Movie Requests</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>tmdbId</th>
                <th>Ombi Available</th>
                <th>Ombi Request Id</th>
                <th>Ombi Request Status</th>
            </tr>
        </thead>
        <tbody>
            <!-- If the list is empty, show a friendly message -->
            <tr th:if="${#lists.isEmpty(movies)}">
                <td colspan="5" style="text-align: center;">No movie requests found.</td>
            </tr>
            
            <!-- Loop through the list of movies -->
            <tr th:each="movie : ${movies}">
                <td th:text="${movie.id}">1</td>
                <td th:text="${movie.title}">Movie Title</td>
                <td th:text="${movie.tmdbid}">Genre</td>
                <td th:text="${movie.ombiAvailable}">2000</td>
                <td th:text="${movie.ombiRequestId}">2000</td>
                <td th:text="${movie.ombiRequestStatus}">2000</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
