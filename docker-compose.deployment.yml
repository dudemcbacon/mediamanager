---
services:
  mediamanager:
    image: ${MEDIAMANAGER_IMAGE:-ghcr.io/dudemcbacon/mediamanager:latest}
    container_name: mediamanager-app
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: true
    ports:
      - '${APP_PORT:-12345}:8080'
    # Set PUID/PGID in .env to run the JVM as a specific host uid/gid (the
    # entrypoint remaps the "app" user); omit them to keep the image default.
    # Set TZ (e.g. TZ=America/Los_Angeles) in .env to set the timezone; the JVM
    # and OS-level timestamps both follow it. Omit it to default to UTC.
    env_file:
      - .env

  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Only needed if the GHCR package is private — supplies pull credentials.
      # Run `docker login ghcr.io` on the host first, then uncomment:
      # - ${HOME}/.docker/config.json:/config.json:ro
    command: --interval 300 --cleanup --label-enable
