---
services:
  mediamanager:
    image: ${MEDIAMANAGER_IMAGE:-ghcr.io/bburnett/mediamanager:latest}
    container_name: mediamanager-app
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: true
    ports:
      - '${APP_PORT:-8080}:8080'
    env_file:
      - .env

  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Only needed if the GHCR package is private — supplies pull credentials.
      # Run `docker login ghcr.io` on the host first, then uncomment:
      # - ${HOME}/.docker/config.json:/config.json:ro
    command: --interval 300 --cleanup --label-enable
