services:
  app:
    image: ${MEDIAMANAGER_IMAGE:-ghcr.io/bburnett/mediamanager:latest}
    container_name: mediamanager-app
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${APP_PORT:-8080}:8080'
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-mediamanager}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-mediamanager}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Only needed if the GHCR package is private — supplies pull credentials.
      # Run `docker login ghcr.io` on the host first, then uncomment:
      # - ${HOME}/.docker/config.json:/config.json:ro
    command: --interval 300 --cleanup --label-enable
