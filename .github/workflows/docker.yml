name: Build & Publish Container

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Serialize runs per-ref so two main builds can't race on the version-bump commit/push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mediamanager
          POSTGRES_PASSWORD: mediamanager
          POSTGRES_DB: mediamanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mediamanager -d mediamanager"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mediamanager
      SPRING_DATASOURCE_USERNAME: mediamanager
      SPRING_DATASOURCE_PASSWORD: mediamanager
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
          if-no-files-found: ignore

  # Bumps the version and commits it back to main once tests pass. On every other ref it just
  # echoes the current version, so the build job (which needs this job) still runs for branches/PRs.
  version:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and bump version
        id: resolve
        run: |
          set -euo pipefail
          current=$(grep -E "^version = " build.gradle | sed -E "s/^version = '(.*)'.*/\1/")
          echo "Current version: $current"
          sha="${{ github.sha }}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            base="${current%-SNAPSHOT}"
            if [ "$current" = "$base" ]; then
              # Already a released version -> increment the patch.
              major="${base%%.*}"; rest="${base#*.}"; minor="${rest%%.*}"; patch="${rest#*.}"
              newv="$major.$minor.$((patch + 1))"
            else
              # Had -SNAPSHOT -> release it as-is by dropping the suffix.
              newv="$base"
            fi
            echo "Releasing version: $newv"
            sed -i -E "s/^version = '.*'/version = '$newv'/" build.gradle
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "ci: release $newv [skip ci]" build.gradle
            git push origin HEAD:main
            sha=$(git rev-parse HEAD)
            echo "version=$newv" >> "$GITHUB_OUTPUT"
          else
            echo "version=$current" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  build:
    needs: [test, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Build from the (possibly) bumped commit so build-info.version matches the published tag.
          ref: ${{ needs.version.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long
            type=semver,pattern={{version}}
            type=raw,value=${{ needs.version.outputs.version }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ needs.version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
